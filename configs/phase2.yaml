# Phase 2: Braid 파인튜닝
# Phase 1 체크포인트 로드 후 braid 도메인 적응 (1000장)

base: configs/base.yaml

training:
  phase: 2
  seed: 42
  dataset: braid_train
  resume_from: outputs/phase1_color_loss/final
  epochs: 30
  learning_rate: 2.0e-5
  warmup_steps: 0
  use_wandb: true
  wandb_project: "hair-dit3"
  wandb_run_name: "phase2_color_loss_bg0.5_c1.5_seed42"
  loss_weights:
    flow: 1.0
    bg: 0.5
    color: 1.5
    lpips: 0.2
    edge: 0.15

checkpointing:
  output_dir: outputs/phase2_color_loss
