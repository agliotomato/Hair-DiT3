# Phase 2: Braid 파인튜닝
# Phase 1 체크포인트 로드 후 braid 도메인 적응 (1000장)

base: configs/base.yaml

training:
  phase: 2
  dataset: braid_train
  resume_from: outputs/phase1/checkpoint-19000
  epochs: 50
  learning_rate: 5.0e-5
  warmup_steps: 100
  use_wandb: true
  wandb_project: "hair-dit3"
  wandb_run_name: "phase2_braid_specialization"
  loss_weights:
    flow: 1.0
    bg: 3.0
    lpips: 0.1
    edge: 0.05

checkpointing:
  output_dir: outputs/phase2
