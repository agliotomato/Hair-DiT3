# Phase 1: Unbraid 사전학습
# matte_cnn + sd3_controlnet, unbraid 재구성 (3000장)

base: configs/base.yaml

training:
  phase: 1
  dropout: 0.1
  resume_from: null
  use_wandb: true
  wandb_project: "hair-dit3"
  wandb_run_name: "phase1_stroke_color_bg0.5_sc1.0_seed42"
  seed: 42
  dataset: unbraid_train
  epochs: 50
  learning_rate: 1.0e-4
  warmup_steps: 500
  loss_weights:
    stroke_color: 1.0
    edge: 0.0   # Phase 1에서는 엣지 손실 제외 (철학 반영)

checkpointing:
  output_dir: outputs/phase1_stroke_color
