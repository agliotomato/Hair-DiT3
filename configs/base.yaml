# EHC v2 кіөнҶө м„Өм •
# transformer лҸҷкІ°, matte_cnn + sd3_controlnetл§Ң н•ҷмҠө (LoRA м—ҶмқҢ)

model:
  model_id: stabilityai/stable-diffusion-3.5-medium
  blend_start_ratio: 0.5   # м•һ 50% full residual, л’Ө 50% matte gate

data:
  root: dataset
  image_size: 512

training:
  batch_size: 8
  gradient_accumulation_steps: 1   # Effective batch = 8 (GH200 optimized)
  mixed_precision: bf16
  gradient_checkpointing: true
  gradient_clip: 1.0
  ema_decay: 0.9999
  logit_mean: 0.0   # Logit-Normal sigma мғҳн”Ңл§Ғ (мӨ‘к°„ л…ёмқҙмҰҲ м§‘мӨ‘)
  logit_std: 1.0
  warmup_steps: 500
  lpips_warmup_ratio: 0.3   # 30% step мқҙнӣ„ LPIPS нҷңм„ұнҷ” (мІ н•ҷ мқҙмӢқ)
  use_wandb: true
  loss_weights:
    flow: 1.0
    bg: 3.0
    lpips: 0.1
    edge: 0.05

checkpointing:
  output_dir: outputs/hair_s2i
  log_every: 50
  save_every: 1000
